<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether Royale Casino</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0a0a14 0%, #1a142e 100%); font-family: system-ui; }
    .card { background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); border: 1px solid rgba(255,215,0,0.3); }
    .neon { text-shadow: 0 0 20px #ffd700; }
    .transition-all { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>
</head>
<body class="min-h-screen text-white">
  <div id="app" class="max-w-md mx-auto p-6">

    <!-- LOGIN / REGISTER -->
    <div id="authScreen">
      <div class="text-center mb-8 pt-8">
        <h1 class="text-5xl font-bold neon text-yellow-400">AETHER ROYALE</h1>
        <p class="text-yellow-400/70">Luxury Casino • 18+</p>
      </div>

      <div class="flex border-b border-yellow-400/30 mb-6">
        <button onclick="switchTab(0)" id="tabLogin" class="flex-1 py-4 font-semibold border-b-2 border-yellow-400">Login</button>
        <button onclick="switchTab(1)" id="tabRegister" class="flex-1 py-4 font-semibold text-gray-400">Register</button>
      </div>

      <!-- Login Form -->
      <div id="loginFormContainer">
        <form id="loginForm" class="space-y-5">
          <input type="text" id="loginUsername" placeholder="Username" required class="w-full bg-black/60 border border-gray-600 rounded-2xl py-4 px-5 focus:border-yellow-400 outline-none">
          <input type="password" id="loginPassword" placeholder="Password" required class="w-full bg-black/60 border border-gray-600 rounded-2xl py-4 px-5 focus:border-yellow-400 outline-none">
          <button type="submit" class="w-full bg-gradient-to-r from-yellow-400 to-amber-500 text-black font-bold py-4 rounded-2xl text-lg">LOGIN</button>
        </form>
      </div>

      <!-- Register Form -->
      <div id="registerFormContainer" class="hidden">
        <form id="registerForm" class="space-y-5">
          <input type="text" id="regUsername" placeholder="Choose Username" required class="w-full bg-black/60 border border-gray-600 rounded-2xl py-4 px-5 focus:border-yellow-400 outline-none">
          <input type="email" id="regEmail" placeholder="Email Address" required class="w-full bg-black/60 border border-gray-600 rounded-2xl py-4 px-5 focus:border-yellow-400 outline-none">
          <input type="email" id="regConfirmEmail" placeholder="Confirm Email" required class="w-full bg-black/60 border border-gray-600 rounded-2xl py-4 px-5 focus:border-yellow-400 outline-none">
          <input type="password" id="regPassword" placeholder="Create Password" required class="w-full bg-black/60 border border-gray-600 rounded-2xl py-4 px-5 focus:border-yellow-400 outline-none">
          <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required class="w-full bg-black/60 border border-gray-600 rounded-2xl py-4 px-5 focus:border-yellow-400 outline-none">
          <button type="submit" class="w-full bg-gradient-to-r from-emerald-400 to-teal-500 text-black font-bold py-4 rounded-2xl text-lg">CREATE ACCOUNT</button>
        </form>
      </div>
    </div>

    <!-- THANK YOU SCREEN -->
    <div id="thankYouScreen" class="hidden text-center py-20">
      <h2 class="text-4xl font-bold text-yellow-400 mb-4">Thank You!</h2>
      <p class="text-xl">Welcome to Aether Royale</p>
      <p class="text-sm text-gray-400 mt-8">Redirecting to your casino dashboard...</p>
    </div>

    <!-- DASHBOARD / SLOTS -->
    <div id="dashboardScreen" class="hidden">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold">Welcome, <span id="playerName"></span></h1>
        <button onclick="logout()" class="text-red-400">Logout</button>
      </div>
      <div class="bg-black/40 p-8 rounded-3xl text-center">
        <p class="text-2xl mb-6">Balance: $<span id="balance">1000</span></p>
        <button onclick="goToSlots()" class="w-full bg-yellow-400 text-black py-6 rounded-2xl text-2xl font-bold hover:scale-105 transition">🎰 PLAY SLOTS NOW</button>
      </div>
    </div>

    <!-- SLOTS GAME -->
    <div id="slotsScreen" class="hidden">
      <button onclick="goToDashboard()" class="mb-4 text-yellow-400">← Back to Dashboard</button>
      <div class="text-center mb-6">
        <h2 class="text-4xl font-bold neon">AETHER SLOTS</h2>
      </div>
      <!-- Reels and game logic will be here - simplified for now -->
      <div class="bg-black/70 p-8 rounded-3xl">
        <div class="flex justify-center gap-4 mb-8" id="reels">
          <div class="reel w-20 h-28 bg-purple-900 flex items-center justify-center text-5xl border-4 border-yellow-400 rounded">7</div>
          <div class="reel w-20 h-28 bg-purple-900 flex items-center justify-center text-5xl border-4 border-yellow-400 rounded">💎</div>
          <div class="reel w-20 h-28 bg-purple-900 flex items-center justify-center text-5xl border-4 border-yellow-400 rounded">👑</div>
        </div>
        <button onclick="spinSlots()" class="w-full py-6 bg-gradient-to-r from-yellow-400 to-amber-500 text-black text-2xl font-bold rounded-2xl">SPIN - 50 Credits</button>
        <p id="slotsMessage" class="mt-4 text-center text-yellow-400"></p>
      </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminScreen" class="hidden">
      <h1 class="text-4xl font-bold neon mb-6">Admin Panel</h1>
      <button onclick="downloadUsersJSON()" class="mb-6 bg-blue-600 px-6 py-3 rounded-xl">Download All Users (JSON)</button>
      <div id="usersList" class="space-y-4"></div>
      <button onclick="logout()" class="mt-8 text-red-400">Exit Admin</button>
    </div>
  </div>

  <script>
    // === FIREBASE CONFIG - REPLACE WITH YOUR OWN ===
    const firebaseConfig = {
      apiKey: "AIzaSyAeGaxQOpqv6Gw5A5ClAn3FsBoYoaUpuI0",
      authDomain: "aether-royale-2.firebaseapp.com",
      projectId: "aether-royale-2",
      storageBucket: "aether-royale-2.firebasestorage.app",
      messagingSenderId: "407295419318",
      appId: "1:407295419318:web:e35b96c60d5a7d53f51717"
    };

    // Initialize Firebase
    let app, auth, db;
    let currentUser = null;

    function initFirebase() {
      if (!firebase.apps.length) {
        app = firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
      }
    }

    // Simple in-memory fallback if Firebase not set up
    let localUsers = {};

    async function registerUser(username, email, password) {
      initFirebase();
      try {
        // For demo, we'll use Firestore directly (no full Auth for simplicity)
        const userRef = db.collection("users").doc(username);
        await userRef.set({
          username: username,
          email: email,
          password: password, // plain text as requested
          balance: 1000,
          role: "player",
          createdAt: new Date()
        });
        alert("Account created successfully!");
        return true;
      } catch(e) {
        console.error(e);
        alert("Registration failed. Check Firebase config.");
        return false;
      }
    }

    // Rest of the logic (simplified)
    function switchTab(n) {
      document.getElementById('loginFormContainer').classList.toggle('hidden', n === 1);
      document.getElementById('registerFormContainer').classList.toggle('hidden', n === 0);
      document.getElementById('tabLogin').classList.toggle('border-b-2', n === 0);
      document.getElementById('tabLogin').classList.toggle('text-gray-400', n === 1);
      document.getElementById('tabRegister').classList.toggle('border-b-2', n === 1);
      document.getElementById('tabRegister').classList.toggle('text-gray-400', n === 0);
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('regUsername').value.trim().toLowerCase();
      const email = document.getElementById('regEmail').value;
      const confirmEmail = document.getElementById('regConfirmEmail').value;
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;

      if (email !== confirmEmail) {
        alert("Emails do not match");
        return;
      }
      if (password !== confirmPassword) {
        alert("Passwords do not match");
        return;
      }

      const success = await registerUser(username, email, password);
      if (success) {
        showThankYouThenDashboard(username);
      }
    });

    function showThankYouThenDashboard(username) {
      document.getElementById('authScreen').classList.add('hidden');
      document.getElementById('thankYouScreen').classList.remove('hidden');
      
      setTimeout(() => {
        document.getElementById('thankYouScreen').classList.add('hidden');
        showDashboard(username);
      }, 1800);
    }

    function showDashboard(username) {
      currentUser = username;
      document.getElementById('dashboardScreen').classList.remove('hidden');
      document.getElementById('playerName').textContent = username;
    }

    function goToSlots() {
      document.getElementById('dashboardScreen').classList.add('hidden');
      document.getElementById('slotsScreen').classList.remove('hidden');
    }

    function goToDashboard() {
      document.getElementById('slotsScreen').classList.add('hidden');
      document.getElementById('dashboardScreen').classList.remove('hidden');
    }

    function spinSlots() {
      document.getElementById('slotsMessage').textContent = "🎉 BIG WIN! +250 Credits";
      setTimeout(() => document.getElementById('slotsMessage').textContent = "", 2000);
    }

    function logout() {
      location.reload();
    }

    function downloadUsersJSON() {
      alert("In full Firebase version this would download real user data.\n\nFor now, check your Firebase console.");
    }

    // Init
    switchTab(0);
    initFirebase(); // Try to init
  </script>
</body>
</html>
